<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Desde Hoy</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#08121f;
overflow:hidden;
font-family:Georgia, serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

#stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{

0%{opacity:.2;}

50%{opacity:1;}

100%{opacity:.2;}

}

.book{

width:320px;
height:430px;

background:linear-gradient(145deg,#f5e8c7,#e6d2a2);

border-radius:8px;

box-shadow:0 30px 80px rgba(0,0,0,.45);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

cursor:pointer;

transition:.6s;

z-index:10;

}

.book:hover{

transform:scale(1.03);

}

h1{

font-size:48px;

color:#5d3d14;

margin-bottom:20px;

}

p{

font-size:18px;

color:#76562d;

text-align:center;

width:80%;

line-height:1.6;

}

.small{

margin-top:30px;

font-size:14px;

opacity:.6;

}
</style>

</head>

<body>

<div id="stars"></div>

<div class="book" onclick="abrir()">

<h1>Desde Hoy</h1>

<p>

Para la mujer que me enseñó que el amor también puede sentirse como un hogar.

</p>

<p class="small">

Haz clic para comenzar.

</p>

</div>

<script>

const stars=document.getElementById("stars");

for(let i=0;i<180;i++){

const s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDelay=Math.random()*3+"s";

stars.appendChild(s);

}

function abrir(){

function abrir(){

const libro = document.querySelector(".book");

libro.style.transform="scale(1.25) rotateY(-18deg)";
libro.style.boxShadow="0 50px 120px rgba(0,0,0,.65)";

setTimeout(()=>{

document.body.style.transition="2s";
document.body.style.background="#02070d";

libro.innerHTML=`

<h1 style="font-size:42px;color:#5d3d14;">Proyecto Aurora</h1>

<p style="margin-top:20px;font-size:22px;line-height:1.8;">

Todas las historias comienzan una vez.

<br><br>

Las que valen la pena...

<br><br>

se siguen escribiendo todos los días.

</p>

<p class="small">

Desliza para comenzar

</p>

`;

},900);

}
